name: AX1800Pro-IPQ6000-128G-完整版
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装编译环境
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev python3 unzip binutils bzip2 gawk gettext git libz-dev libssl-dev patch gcc-multilib

      - name: 克隆iStoreOS源码（最适合IPQ6000+128G）
        run: |
          git clone https://github.com/istoreos/istoreos openwrt

      - name: 添加插件源
        run: |
          cd openwrt
          echo "src-git kenzo https://github.com/kenzok8/openwrt-packages" >> feeds.conf.default
          echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 导入配置
        run: |
          cp .config openwrt/.config
          cd openwrt
          make defconfig

      - name: 下载依赖
        run: |
          cd openwrt
          make download -j$(nproc) V=s

      - name: 开始编译
        run: |
          cd openwrt
          make -j1 V=s IGNORE_ERRORS=1

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: AX1800Pro-IPQ6000-128G
          path: openwrt/bin/targets/qualcommax/ipq60xx/*.bin
