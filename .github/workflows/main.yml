name: AX1800Pro-OpenWrt-修复版
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 初始化环境
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev python3 unzip binutils bzip2 gawk gettext git libz-dev libssl-dev patch gcc-multilib

      - name: 下载Lean源码
        run: |
          git clone https://github.com/coolsnowwolf/lede openwrt
          cd openwrt

      - name: 添加第三方插件源（修复缺失插件）
        run: |
          cd openwrt
          echo "src-git kenzo https://github.com/kenzok8/openwrt-packages" >> feeds.conf.default
          echo "src-git small https://github.com/kenzok8/small-package" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 导入配置
        run: |
          cp .config openwrt/.config
          cd openwrt
          make defconfig

      - name: 下载依赖
        run: |
          cd openwrt
          make download -j$(nproc) V=s

      - name: 开始编译（单线程稳定版）
        run: |
          cd openwrt
          make -j1 V=s IGNORE_ERRORS=1

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-jdcloud-ax1800pro
          path: openwrt/bin/targets/ramips/mt7621/*.bin
