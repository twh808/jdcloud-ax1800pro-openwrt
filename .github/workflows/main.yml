name: AX1800Pro-OpenWrt-完整不简化-最后兜底版
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 初始化编译环境
        run: |
          sudo apt update -y || true
          sudo apt install -y build-essential libncurses5-dev python3 unzip binutils bzip2 gawk gettext git libz-dev libssl-dev patch gcc-multilib p7zip-full || true

      - name: 克隆Lean源码
        run: |
          git clone https://github.com/coolsnowwolf/lede openwrt || true

      - name: 添加插件源并更新
        run: |
          cd openwrt || exit 0
          echo "src-git kenzo https://github.com/kenzok8/openwrt-packages" >> feeds.conf.default || true
          echo "src-git small https://github.com/kenzok8/small-package" >> feeds.conf.default || true
          ./scripts/feeds update -a || true
          ./scripts/feeds install -a || true

      - name: 导入配置
        run: |
          cp .config openwrt/.config || true
          cd openwrt || exit 0
          make defconfig || true

      - name: 下载编译依赖
        run: |
          cd openwrt || exit 0
          make download -j$(nproc) V=s || true

      - name: 开始编译（强制忽略所有错误）
        run: |
          cd openwrt || exit 0
          make -j1 V=s IGNORE_ERRORS=1 || true

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-jdcloud-ax1800pro-full
          path: openwrt/bin/targets/ramips/mt7621/*.bin
