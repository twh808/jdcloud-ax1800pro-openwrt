name: AX1800Pro-OpenWrt-终极容错版
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 初始化环境
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev python3 unzip binutils bzip2 gawk gettext git libz-dev libssl-dev patch gcc-multilib p7zip-full

      - name: 克隆Lean源码
        run: |
          git clone https://github.com/coolsnowwolf/lede openwrt
          cd openwrt

      - name: 添加插件源
        run: |
          cd openwrt
          sed -i '$a src-git kenzo https://github.com/kenzok8/openwrt-packages' feeds.conf.default
          sed -i '$a src-git small https://github.com/kenzok8/small-package' feeds.conf.default
          ./scripts/feeds update -a || true
          ./scripts/feeds install -a || true

      - name: 导入配置
        run: |
          cp .config openwrt/.config
          cd openwrt
          make defconfig

      - name: 下载依赖（容错）
        run: |
          cd openwrt
          make download -j$(nproc) V=s || true

      - name: 开始编译（终极容错）
        run: |
          cd openwrt
          make -j1 V=s IGNORE_ERRORS=1 || true

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-jdcloud-ax1800pro
          path: openwrt/bin/targets/ramips/mt7621/*.bin
