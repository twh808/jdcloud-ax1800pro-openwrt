name: AX1800Pro-OpenWrt-完整版不简化
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 初始化编译环境
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev python3 unzip binutils bzip2 gawk gettext git libz-dev libssl-dev patch gcc-multilib p7zip-full

      - name: 克隆Lean源码
        run: |
          git clone https://github.com/coolsnowwolf/lede openwrt

      - name: 添加插件源（修复所有缺失）
        run: |
          cd openwrt
          echo "" >> feeds.conf.default
          echo "src-git kenzo https://github.com/kenzok8/openwrt-packages" >> feeds.conf.default
          echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 导入配置
        run: |
          cp .config openwrt/.config
          cd openwrt
          make defconfig

      - name: 下载依赖
        run: |
          cd openwrt
          make download -j$(nproc) V=s

      - name: 编译（无错误 不简化）
        run: |
          cd openwrt
          make -j1 V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-jdcloud-ax1800pro-full
          path: openwrt/bin/targets/ramips/mt7621/*.bin
